<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Outer hexagon (the "Core") -->
  <path d="M 100 20 L 165 55 L 165 145 L 100 180 L 35 145 L 35 55 Z"
        fill="url(#coreGradient)" stroke="none"/>

  <!-- Inner hexagon highlight -->
  <path d="M 100 35 L 152 62 L 152 138 L 100 165 L 48 138 L 48 62 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Glow behind book -->
  <circle cx="100" cy="100" r="45" fill="url(#glowGradient)"/>

  <!-- Open book -->
  <g transform="translate(100, 100)">
    <!-- Book spine shadow -->
    <path d="M 0 -22 L 0 22" stroke="#1e293b" stroke-width="1.5" stroke-opacity="0.4"/>

    <!-- Left page -->
    <path d="M -38 -20 Q -38 -22 -36 -22 L -2 -22 L -2 22 L -36 22 Q -38 22 -38 20 Z"
          fill="#ffffff"/>
    <!-- Right page -->
    <path d="M 38 -20 Q 38 -22 36 -22 L 2 -22 L 2 22 L 36 22 Q 38 22 38 20 Z"
          fill="#ffffff"/>

    <!-- Page lines (left) -->
    <line x1="-32" y1="-12" x2="-8" y2="-12" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-32" y1="-5" x2="-8" y2="-5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="-32" y1="2" x2="-8" y2="2" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="-32" y1="9" x2="-14" y2="9" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>

    <!-- Page lines (right) -->
    <line x1="8" y1="-12" x2="32" y2="-12" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="-5" x2="32" y2="-5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="2" x2="32" y2="2" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="9" x2="26" y2="9" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Orbiting nodes (representing the core/atom concept) -->
  <g fill="#ffffff" opacity="0.95">
    <circle cx="100" cy="40" r="3.5"/>
    <circle cx="160" cy="100" r="3.5"/>
    <circle cx="100" cy="160" r="3.5"/>
    <circle cx="40" cy="100" r="3.5"/>
  </g>

  <!-- Connecting orbital arcs -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.35">
    <ellipse cx="100" cy="100" rx="60" ry="60"/>
  </g>
</svg>
